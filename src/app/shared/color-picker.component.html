<div class="cp">
  <div class="lbl">{{ label }}<span class="hint" *ngIf="hint"> · {{ hint }}</span></div>

  <!-- Tap a swatch to pick. "+" opens an in-app custom picker (no OS dialog). -->
  <div class="cp-grid">
    <button *ngFor="let c of presets" class="sw" [class.sel]="c===value" [style.background]="c" (click)="pick(c)">
      <span class="tick" *ngIf="c===value">✓</span>
    </button>
    <button *ngIf="allowTransparent" class="sw transparent-sw" [class.sel]="value===transparentValue" (click)="pick(transparentValue)" title="Transparent">
      <span class="checker"></span>
    </button>
    <button type="button" class="sw custom" [class.sel]="customOpen" (click)="customOpen ? closeCustom() : openCustom()" title="Custom colour">
      <span class="plus">{{ customOpen ? '×' : '+' }}</span>
    </button>
    <button *ngIf="allowGradient" type="button" class="sw gradient-sw" [class.sel]="gradientOpen || isGradient"
            (click)="gradientOpen ? closeGradient() : openGradient()" title="Gradient">
      <span class="grad-ic"></span>
    </button>
  </div>

  <!-- Two-stop linear-gradient builder -->
  <div class="cp-gradient" *ngIf="gradientOpen">
    <div class="cg-preview" [style.background]="gradientCss"></div>
    
    <div class="cg-group">
      <label class="cg-row">
        <span>Color 1</span>
        <span class="cg-sw" [style.background]="g1"></span>
        <span class="cg-hex">#<input [ngModel]="strip(g1)" (ngModelChange)="onG1($event)" maxlength="6" placeholder="hex" /></span>
      </label>
      <div class="cg-hsl">
        <label class="cc-row">
          <span>Hue</span>
          <input type="range" min="0" max="360" [value]="g1H" class="cc-slider hue"
                 (input)="g1H = +$any($event.target).value; applyG1Hsl()" />
        </label>
        <label class="cc-row">
          <span>Saturation</span>
          <input type="range" min="0" max="100" [value]="g1S" class="cc-slider" [style.background]="g1SatTrack"
                 (input)="g1S = +$any($event.target).value; applyG1Hsl()" />
        </label>
        <label class="cc-row">
          <span>Lightness</span>
          <input type="range" min="0" max="100" [value]="g1L" class="cc-slider" [style.background]="g1LightTrack"
                 (input)="g1L = +$any($event.target).value; applyG1Hsl()" />
        </label>
      </div>
    </div>

    <div class="cg-group">
      <label class="cg-row">
        <span>Color 2</span>
        <span class="cg-sw" [style.background]="g2"></span>
        <span class="cg-hex">#<input [ngModel]="strip(g2)" (ngModelChange)="onG2($event)" maxlength="6" placeholder="hex" /></span>
      </label>
      <div class="cg-hsl">
        <label class="cc-row">
          <span>Hue</span>
          <input type="range" min="0" max="360" [value]="g2H" class="cc-slider hue"
                 (input)="g2H = +$any($event.target).value; applyG2Hsl()" />
        </label>
        <label class="cc-row">
          <span>Saturation</span>
          <input type="range" min="0" max="100" [value]="g2S" class="cc-slider" [style.background]="g2SatTrack"
                 (input)="g2S = +$any($event.target).value; applyG2Hsl()" />
        </label>
        <label class="cc-row">
          <span>Lightness</span>
          <input type="range" min="0" max="100" [value]="g2L" class="cc-slider" [style.background]="g2LightTrack"
                 (input)="g2L = +$any($event.target).value; applyG2Hsl()" />
        </label>
      </div>
    </div>

    <label class="cg-row">
      <span>Angle</span>
      <input type="range" min="0" max="360" [value]="gAngle" class="cc-slider"
             (input)="gAngle = +$any($event.target).value; applyGradient()" />
      <span class="cg-deg">{{ gAngle }}°</span>
    </label>
    <button type="button" class="cc-done" (click)="closeGradient()">Done</button>
  </div>

  <!-- In-app custom picker: Hue / Saturation / Lightness sliders -->
  <div class="cp-custom" *ngIf="customOpen">
    <div class="cc-top">
      <span class="cc-preview" [style.background]="preview"></span>
      <span class="cc-hex">#<input [ngModel]="strip(value)" (ngModelChange)="onHex($event)" maxlength="6" placeholder="hex" /></span>
    </div>
    <label class="cc-row">
      <span>Hue</span>
      <input type="range" min="0" max="360" [value]="hue" class="cc-slider hue"
             (input)="hue = +$any($event.target).value; applyHsl()" />
    </label>
    <label class="cc-row">
      <span>Saturation</span>
      <input type="range" min="0" max="100" [value]="sat" class="cc-slider" [style.background]="satTrack"
             (input)="sat = +$any($event.target).value; applyHsl()" />
    </label>
    <label class="cc-row">
      <span>Lightness</span>
      <input type="range" min="0" max="100" [value]="light" class="cc-slider" [style.background]="lightTrack"
             (input)="light = +$any($event.target).value; applyHsl()" />
    </label>
    <button type="button" class="cc-done" (click)="closeCustom()">Done</button>
  </div>

  <!-- Current selection at a glance (hidden while the custom panel is open) -->
  <div class="cp-current" *ngIf="!customOpen">
    <span class="chip" [class.is-transparent]="value===transparentValue" [style.background]="value===transparentValue ? null : value">
      <span class="checker" *ngIf="value===transparentValue"></span>
    </span>
    <span class="val">{{ value }}</span>
    <button type="button" class="cp-reset" *ngIf="allowReset" (click)="doReset()">Reset to default</button>
  </div>
</div>
