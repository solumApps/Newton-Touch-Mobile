<ion-header>
  <ion-toolbar>
    <div class="ph">
      <app-brand variant="light" [sub]="true"></app-brand>
      <div class="ws" *ngIf="company || store">
        <span class="co">{{ company }}</span>
        <span class="st" *ngIf="store">{{ store }}</span>
      </div>
    </div>
  </ion-toolbar>
</ion-header>
