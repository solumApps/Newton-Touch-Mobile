<ion-header>
  <ion-toolbar>
    <!-- <ion-buttons slot="start"><ion-button (click)="cancel()">{{ backLabel }}</ion-button></ion-buttons> -->
     <ion-buttons slot="start"><ion-button class="ghost-action" (click)="cancel()" aria-label="Back">‹</ion-button></ion-buttons>
    <ion-title>{{ pageTitle }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="wrap">
    <div class="field">
      <label>Content name</label>
      <input class="inp" [class.err]="nameError" [(ngModel)]="name" (ngModelChange)="nameError=''" placeholder="e.g. Holiday Campaign" />
      <p class="field-error" *ngIf="nameError">{{ nameError }}</p>
    </div>

    <app-select-field [label]="themeSelectLabel" placeholder="Choose a theme"
      [options]="themeOpts" [value]="themeId" [disabled]="themeLockedFromPreview" (valueChange)="themeId=$event"></app-select-field>

    <!-- chosen theme mini-preview -->
    <div class="tprev" *ngIf="selectedTheme as st">
      <div class="sw" [style.background]="st.tokens.background"></div>
      <div class="ds">{{ st.tokens.homeLayout }} · {{ st.tokens.cardShape }} {{ st.tokens.cardContent }} · {{ st.tokens.resultTemplate }}</div>
    </div>

    <app-select-field label="Step 2 · App mode" placeholder="Choose a mode"
      [options]="modeOpts" [value]="mode" (valueChange)="mode=$any($event)"></app-select-field>

    <p class="hint" *ngIf="selectedMode">{{ selectedMode.ds }}</p>
  </div>
</ion-content>

<ion-footer class="foot">
  <button class="btn-y" [disabled]="!themeId || !mode" (click)="next()">
    Continue to {{ mode === 'category' ? 'Fetch Products' : 'Builder' }} →
  </button>
</ion-footer>
