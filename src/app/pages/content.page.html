<app-page-header [company]="company" [store]="store"></app-page-header>

<ion-content>
  <div class="wrap">
    <div class="page-title">Content</div>
    <div class="srch">
      <input placeholder="Search content" [value]="q" (input)="q=$any($event.target).value||''" />
    </div>

    <div class="crd item" *ngFor="let c of filtered()" (click)="open(c)">
      <div class="sw" [style.background]="c.themeTokens.background || '#2F006D'"></div>
      <div class="meta">
        <div class="nm">{{ c.name }}</div>
        <div class="th">Theme: {{ c.themeName }}</div>
        <div class="chips">
          <span class="chip act">{{ modeLabel(c.appMode) }}</span>
          <span class="chip" [class.ok]="c.deployedTo">{{ c.deployedTo ? 'Deployed' : (c.status | titlecase) }}</span>
        </div>
        <div class="dep" *ngIf="c.deployedTo">→ {{ c.deployedTo }}</div>
      </div>
      <span class="chev">›</span>
    </div>

    <div *ngIf="!filtered().length" class="empty">No content yet — tap below to create.</div>
  </div>
</ion-content>

<ion-footer class="foot">
  <button class="btn-y" (click)="create()">+ Create Content</button>
</ion-footer>
